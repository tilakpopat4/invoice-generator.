<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Management Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden text-slate-800">

    <!-- Sidebar: Add/Edit Form -->
    <aside class="w-96 bg-white border-r border-slate-200 p-6 flex flex-col shadow-lg z-10">
        <div class="mb-8 flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-md">
                C
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-900 leading-tight">Client Hub</h1>
                <p class="text-xs text-slate-500">Personal Management</p>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto pr-2">
            <h2 id="form-title" class="text-lg font-semibold mb-4 text-slate-800 border-b pb-2">Add New Client</h2>
            
            <form id="client-form" class="space-y-4">
                <input type="hidden" id="client-id">
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Full Name <span class="text-red-500">*</span></label>
                    <input type="text" id="client-name" required class="w-full rounded-md border-slate-300 shadow-sm p-2.5 border focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition outline-none text-sm bg-slate-50" placeholder="e.g. Acme Corp">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Contact Number</label>
                    <input type="text" id="client-contact" class="w-full rounded-md border-slate-300 shadow-sm p-2.5 border focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition outline-none text-sm bg-slate-50" placeholder="e.g. +91 98765 43210">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                    <input type="email" id="client-email" class="w-full rounded-md border-slate-300 shadow-sm p-2.5 border focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition outline-none text-sm bg-slate-50" placeholder="e.g. contact@acme.com">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Notes / Description</label>
                    <textarea id="client-notes" rows="3" class="w-full rounded-md border-slate-300 shadow-sm p-2.5 border focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition outline-none text-sm bg-slate-50 resize-none" placeholder="Add any details about the client..."></textarea>
                </div>

                <div class="pt-4 flex gap-2">
                    <button type="submit" id="save-btn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-md shadow transition duration-200">
                        Save Client
                    </button>
                    <button type="button" id="cancel-btn" onclick="resetForm()" class="hidden bg-slate-200 hover:bg-slate-300 text-slate-700 font-medium py-2.5 px-4 rounded-md transition duration-200">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
        
        <div class="mt-4 pt-4 border-t border-slate-200">
            <a href="index.html" class="flex items-center justify-center gap-2 w-full bg-slate-800 hover:bg-slate-900 text-white text-sm font-medium py-2 px-4 rounded-md transition duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Invoice Generator
            </a>
        </div>
    </aside>

    <!-- Main Content: Client List -->
    <main class="flex-1 overflow-y-auto p-8 relative">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-3xl font-bold text-slate-800">Your Clients</h2>
                    <p class="text-slate-500 mt-1" id="client-count">Manage your client details</p>
                </div>
                
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute left-3 top-2.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input type="text" id="search-input" placeholder="Search clients..." class="pl-10 pr-4 py-2 border border-slate-300 rounded-full text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 w-64 shadow-sm">
                </div>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-center">
                <div class="w-24 h-24 bg-indigo-50 rounded-full flex items-center justify-center mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-indigo-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                </div>
                <h3 class="text-xl font-semibold text-slate-700">No clients found</h3>
                <p class="text-slate-500 mt-2 max-w-sm">Add your first client using the form on the left to start managing your contacts.</p>
            </div>

            <!-- Client Grid -->
            <div id="clients-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                <!-- Client cards will be injected here by JS -->
            </div>
        </div>
    </main>

    <!-- Application Logic -->
    <script>
        // Data Structure
        let clients = JSON.parse(localStorage.getItem('invoice_clients')) || [];

        // DOM Elements
        const form = document.getElementById('client-form');
        const grid = document.getElementById('clients-grid');
        const emptyState = document.getElementById('empty-state');
        const searchInput = document.getElementById('search-input');
        const clientCount = document.getElementById('client-count');
        const formTitle = document.getElementById('form-title');
        const cancelBtn = document.getElementById('cancel-btn');
        const saveBtn = document.getElementById('save-btn');

        // Form Fields
        const idInput = document.getElementById('client-id');
        const nameInput = document.getElementById('client-name');
        const contactInput = document.getElementById('client-contact');
        const emailInput = document.getElementById('client-email');
        const notesInput = document.getElementById('client-notes');

        // Save data to localStorage
        const saveToStorage = () => {
            localStorage.setItem('invoice_clients', JSON.stringify(clients));
        };

        // Render Clients
        const renderClients = (filterText = '') => {
            grid.innerHTML = '';
            
            const filteredClients = clients.filter(c => 
                c.name.toLowerCase().includes(filterText.toLowerCase()) || 
                (c.contact && c.contact.toLowerCase().includes(filterText.toLowerCase())) ||
                (c.email && c.email.toLowerCase().includes(filterText.toLowerCase()))
            );

            clientCount.innerText = `${filteredClients.length} ${filteredClients.length === 1 ? 'client' : 'clients'} total`;

            if (filteredClients.length === 0) {
                emptyState.classList.remove('hidden');
                grid.classList.add('hidden');
            } else {
                emptyState.classList.add('hidden');
                grid.classList.remove('hidden');

                filteredClients.forEach(client => {
                    // Create card
                    const card = document.createElement('div');
                    card.className = 'glass-card rounded-xl p-5 flex flex-col transition-all duration-300 hover:shadow-lg hover:-translate-y-1 relative group overflow-hidden border border-slate-200';
                    
                    // Header color banner
                    card.innerHTML = `
                        <div class="h-2 w-full absolute top-0 left-0 bg-indigo-500 opacity-80"></div>
                        <div class="flex justify-between items-start mb-4 mt-2">
                            <div>
                                <h3 class="text-lg font-bold text-slate-800 line-clamp-1" title="${client.name}">${client.name}</h3>
                                <p class="text-xs text-slate-500 mt-0.5">Added ${new Date(client.createdAt).toLocaleDateString()}</p>
                            </div>
                            <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
                                <button onclick="editClient('${client.id}')" class="p-1.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-md transition" title="Edit">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                                </button>
                                <button onclick="deleteClient('${client.id}')" class="p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-md transition" title="Delete">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </button>
                            </div>
                        </div>
                        
                        <div class="space-y-2 mb-6 flex-1">
                            ${client.contact ? `
                            <div class="flex items-center text-sm text-slate-600">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                                ${client.contact}
                            </div>` : ''}
                            
                            ${client.email ? `
                            <div class="flex items-center text-sm text-slate-600">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                                <a href="mailto:${client.email}" class="hover:text-indigo-600 hover:underline">${client.email}</a>
                            </div>` : ''}

                            ${client.notes ? `
                            <div class="mt-3 pt-3 border-t border-slate-100 text-xs text-slate-500 line-clamp-2" title="${client.notes}">
                                ${client.notes}
                            </div>` : ''}
                        </div>
                        
                        <div class="mt-auto pt-4">
                            <button onclick="generateInvoice('${client.name}', '${client.contact || ''}')" class="w-full flex items-center justify-center gap-2 bg-slate-50 hover:bg-indigo-50 text-indigo-600 border border-indigo-100 font-medium py-2 px-4 rounded transition duration-200 text-sm shadow-sm group-hover:border-indigo-300">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                                Generate Invoice
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        };

        // Form Submit Handler
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const id = idInput.value;
            const name = nameInput.value.trim();
            const contact = contactInput.value.trim();
            const email = emailInput.value.trim();
            const notes = notesInput.value.trim();

            if (!name) return;

            if (id) {
                // Update existing
                const index = clients.findIndex(c => c.id === id);
                if (index !== -1) {
                    clients[index] = { ...clients[index], name, contact, email, notes };
                }
            } else {
                // Add new
                const newClient = {
                    id: Date.now().toString(),
                    name,
                    contact,
                    email,
                    notes,
                    createdAt: new Date().toISOString()
                };
                clients.push(newClient);
            }

            saveToStorage();
            renderClients(searchInput.value);
            resetForm();
        });

        // Edit Client
        window.editClient = (id) => {
            const client = clients.find(c => c.id === id);
            if (!client) return;

            idInput.value = client.id;
            nameInput.value = client.name;
            contactInput.value = client.contact || '';
            emailInput.value = client.email || '';
            notesInput.value = client.notes || '';

            formTitle.innerText = 'Edit Client';
            saveBtn.innerText = 'Update Details';
            cancelBtn.classList.remove('hidden');
            
            // Focus name input softly
            nameInput.focus();
        };

        // Delete Client
        window.deleteClient = (id) => {
            if (confirm('Are you sure you want to delete this client?')) {
                clients = clients.filter(c => c.id !== id);
                saveToStorage();
                renderClients(searchInput.value);
            }
        };

        // Reset Form
        window.resetForm = () => {
            form.reset();
            idInput.value = '';
            formTitle.innerText = 'Add New Client';
            saveBtn.innerText = 'Save Client';
            cancelBtn.classList.add('hidden');
        };

        // Search Listener
        searchInput.addEventListener('input', (e) => {
            renderClients(e.target.value);
        });

        // Generate Invoice specific to client
        window.generateInvoice = (name, contact) => {
            const params = new URLSearchParams({
                clientName: name,
                clientContact: contact
            });
            window.location.href = `index.html?${params.toString()}`;
        };

        // Initial Render
        renderClients();
    </script>
</body>
</html>
